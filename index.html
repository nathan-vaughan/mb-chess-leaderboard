<!DOCTYPE html>
<html>
<head>
  <title>Manitoba Chess Leaderboard</title>

  <style>
    body {
      background-color: black;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
      max-width: 700px;
      margin: 60px auto;
      line-height: 1.8;
    }

    h1 {
      font-weight: 500;
      margin-bottom: 20px;
    }

    .header, .player {
      display: grid;
      grid-template-columns: 50px 1fr 100px 120px;
      align-items: center;
      padding: 6px 0;
    }

    .header {
      border-bottom: 1px solid #444;
      margin-bottom: 10px;
      color: #aaa;
      font-size: 14px;
    }

    .player {
      font-size: 18px;
    }

    .rank {
      color: #888;
    }

    .rating {
      text-align: right;
      color: #aaa;
    }

    .games {
      text-align: right;
      color: #888;
    }

    .top10 {
      color: gold;
      font-weight: 500;
    }
  </style>
</head>

<body>

  <h1>MB Classical Chess Leaderboard</h1>

  <!-- Header row -->
  <div class="header">
    <div>#</div>
    <div>Name</div>
    <div style="text-align:right;">Rating</div>
    <div style="text-align:right;">Games (1y)</div>
  </div>

  <script>
    fetch("players.json")
      .then(res => {
        if (!res.ok) throw new Error("players.json not found");
        return res.json();
      })
      .then(players => {
        players.sort((a, b) => b.rating - a.rating);

        players.forEach((p, i) => {
          const div = document.createElement("div");
          div.className = "player";

          if (i < 10) {
            div.classList.add("top10");
          }

          div.innerHTML = `
            <div class="rank">${i + 1}</div>
            <div>${p.name}</div>
            <div class="rating">${p.rating}</div>
            <div class="games">${p.games ?? "-"}</div>
          `;

          document.body.appendChild(div);
        });
      })
      .catch(err => {
        document.body.innerHTML = "Error loading leaderboard.";
        console.error(err);
      });
  </script>

</body>
</html>
