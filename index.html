<!DOCTYPE html>
<html>
<head>
  <title>Manitoba Chess Leaderboard</title>

  <style>
    body {
      background-color: black;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
      max-width: 600px;
      margin: 60px auto;
      line-height: 1.8;
    }

    h1 {
      font-weight: 500;
      margin-bottom: 30px;
    }

    .player {
      font-size: 20px;
      margin: 6px 0;
      display: flex;
      justify-content: space-between;
    }

    .left {
      display: flex;
      gap: 10px;
    }

    .rank {
      color: #888;
      width: 30px;
    }

    .rating {
      color: #aaa;
    }

    /* Top 10 highlight */
    .top10 {
      color: gold;
      font-weight: 500;
    }
  </style>
</head>

<body>

  <h1>MB Classical Chess Leaderboard</h1>

  <script>
    fetch("players.json")
      .then(res => {
        if (!res.ok) throw new Error("players.json not found");
        return res.json();
      })
      .then(players => {
        players.sort((a, b) => b.rating - a.rating);

        players.forEach((p, i) => {
          const div = document.createElement("div");
          div.className = "player";

          // Apply gold style to top 10
          if (i < 10) {
            div.classList.add("top10");
          }

          div.innerHTML = `
            <div class="left">
              <span class="rank">${i + 1}.</span>
              <span>${p.name}</span>
            </div>
            <span class="rating">${p.rating}</span>
          `;

          document.body.appendChild(div);
        });
      })
      .catch(err => {
        document.body.innerHTML = "Error loading leaderboard.";
        console.error(err);
      });
  </script>

</body>
</html>
