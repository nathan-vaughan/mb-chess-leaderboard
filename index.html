<!DOCTYPE html>
<html>
<head>
  <title>Manitoba Chess Leaderboard</title>

  <style>
    body {
      background-color: black;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
      max-width: 700px;
      margin: 60px auto;
      line-height: 1.8;
    }

    h1 {
      font-weight: 500;
      margin-bottom: 20px;
    }

    .controls {
      margin-bottom: 15px;
    }

    select {
      background: #111;
      color: white;
      border: 1px solid #444;
      padding: 5px;
    }

    .header, .player {
      display: grid;
      grid-template-columns: 50px 1fr 100px 120px;
      align-items: center;
      padding: 6px 0;
    }

    .header {
      border-bottom: 1px solid #444;
      margin-bottom: 10px;
      color: #aaa;
      font-size: 14px;
    }

    .player {
      font-size: 18px;
    }

    .rank {
      color: #888;
    }

    .rating {
      text-align: right;
      color: #aaa;
    }

    .games {
      text-align: right;
      font-weight: 500;
    }

    /* Top 10 players */
    .top10 {
      color: gold;
      font-weight: 500;
    }

    /* Inactive players (0 games) */
    .inactive {
      color: #7d7e7d;
    }

    /* Game activity colors */
    .games.red {
      color: #ff4d4d;
    }

    .games.orange {
      color: #ff9f1a;
    }

    .games.yellow {
      color: #ffd84d;
    }

    .games.green {
      color: #00ad04;
    }
  </style>
</head>

<body>

  <h1>MB Classical Chess Leaderboard</h1>

  <!-- Filter -->
  <div class="controls">
    <label for="activityFilter">Filter: </label>
    <select id="activityFilter">
      <option value="active">Active (> 20)</option>
      <option value="semi">Semi-active (> 10)</option>
      <option value="casual">Casual (> 0)</option>
      <option value="inactive">Inactive (0)</option>
    </select>
  </div>

  <!-- Header -->
  <div class="header">
    <div>#</div>
    <div>Name</div>
    <div style="text-align:right;">Rating</div>
    <div style="text-align:right;">Games (1y)</div>
  </div>

  <div id="leaderboard"></div>

  <script>
    let allPlayers = [];

    fetch("players.json")
      .then(res => {
        if (!res.ok) throw new Error("players.json not found");
        return res.json();
      })
      .then(players => {
        allPlayers = players;
        renderPlayers();
      })
      .catch(err => {
        document.body.innerHTML = "Error loading leaderboard.";
        console.error(err);
      });

    document.getElementById("activityFilter")
      .addEventListener("change", renderPlayers);

    function renderPlayers() {
      const container = document.getElementById("leaderboard");
      container.innerHTML = "";

      const filter = document.getElementById("activityFilter").value;

      let players = allPlayers.filter(p => {
        const games = p.games ?? 0;

        if (filter === "active") return games > 20;
        if (filter === "semi") return games > 10;
        if (filter === "casual") return games > 0;
        if (filter === "inactive") return games === 0;

        return true;
      });

      players.sort((a, b) => b.rating - a.rating);

      players.forEach((p, i) => {
        const div = document.createElement("div");
        div.className = "player";

        const games = p.games ?? 0;

        // Grey out inactive players
        if (games === 0) {
          div.classList.add("inactive");
        }

        // Top 10 highlight (only if not inactive)
        if (i < 10 && games > 0) {
          div.classList.add("top10");
        }

        const gamesClass =
          games === 0 ? "" :
          games < 10 ? "orange" :
          games < 20 ? "yellow" :
          "green";

        div.innerHTML = `
          <div class="rank">${i + 1}</div>
          <div>${p.name}</div>
          <div class="rating">${p.rating}</div>
          <div class="games ${gamesClass}">${games}</div>
        `;

        container.appendChild(div);
      });

      if (players.length === 0) {
        container.innerHTML = "<div style='color:#888;'>No players match filter</div>";
      }
    }
  </script>

</body>
</html>
