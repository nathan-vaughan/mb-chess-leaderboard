<!DOCTYPE html>
<html>
<head>
  <title>Manitoba Chess Leaderboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }

    th {
      background: #333;
      color: white;
    }

    tr:hover {
      background: #f0f0f0;
    }
  </style>
</head>
<body>

  <h1>Manitoba Chess Leaderboard</h1>

  <table>
    <tr>
      <th>Rank</th>
      <th>Name</th>
      <th>Rating</th>
    </tr>

    <tr>
      <td>1</td>
      <td>Player One</td>
      <td>2200</td>
    </tr>

    <tr>
      <td>2</td>
      <td>Player Two</td>
      <td>2100</td>
    </tr>

    <tr>
      <td>3</td>
      <td>Player Three</td>
      <td>2000</td>
    </tr>

  </table>

</body>
</html>
