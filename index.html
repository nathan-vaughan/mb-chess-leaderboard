<!DOCTYPE html>
<html>
<head>
  <title>Manitoba Chess Leaderboard</title>

  <style>
    body {
      background-color: black;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
      max-width: 600px;
      margin: 60px auto;
      line-height: 1.8;
    }

    h1 {
      font-weight: 500;
      margin-bottom: 30px;
    }

    .player {
      font-size: 20px;
      margin: 6px 0;
    }

    .rank {
      color: #888;
      margin-right: 10px;
    }

    .rating {
      float: right;
      color: #aaa;
    }
  </style>
</head>

<body>

  <h1>Manitoba Chess Leaderboard</h1>

  <div class="player">
    <span class="rank">1.</span> John Doe
    <span class="rating">2333</span>
  </div>

  <div class="player">
    <span class="rank">2.</span> Jane Smith
    <span class="rating">2280</span>
  </div>

  <div class="player">
    <span class="rank">3.</span> Alex Chen
    <span class="rating">2205</span>
  </div>

  <script>
fetch("players.json")
  .then(res => {
    if (!res.ok) throw new Error("players.json not found");
    return res.json();
  })
  .then(players => {
    players.sort((a, b) => b.rating - a.rating);

    players.forEach((p, i) => {
      const div = document.createElement("div");
      div.className = "player";
      div.innerHTML = `
        <span class="rank">${i+1}.</span> ${p.name}
        <span class="rating">${p.rating}</span>
      `;
      document.body.appendChild(div);
    });
  })
  .catch(err => {
    document.body.innerHTML = "Error loading leaderboard.";
    console.error(err);
  });
</script>

</body>
</html>
