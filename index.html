<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chess Leaderboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #ffffff;
      margin: 20px;
    }

    h1 {
      text-align: center;
    }

    .controls {
      margin-bottom: 15px;
      text-align: center;
    }

    select {
      padding: 5px;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: #1e1e1e;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #333;
    }

    th {
      background-color: #2c2c2c;
    }

    tr:hover {
      background-color: #2a2a2a;
    }

    /* Game count colors */
    .low { color: #ff4d4d; }      /* <10 */
    .medium { color: #ffa500; }   /* 10–20 */
    .high { color: #ffff66; }     /* 20–40 */
    .very-high { color: #66ff66; }/* 40+ */
  </style>
</head>
<body>

  <h1>Leaderboard</h1>

  <div class="controls">
    <label for="activityFilter">Filter players: </label>
    <select id="activityFilter">
      <option value="all">All Players (> 0 games)</option>
      <option value="semi">Semi-active (> 10 games)</option>
      <option value="active">Active (> 20 games)</option>
    </select>
  </div>

  <table id="leaderboard">
    <thead>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Rating</th>
        <th>Games</th>
      </tr>
    </thead>
    <tbody>
      <!-- Filled by JS -->
    </tbody>
  </table>

  <script>
    let allPlayers = [];

    fetch('players.json')
      .then(response => response.json())
      .then(data => {
        allPlayers = data;
        renderPlayers();
      });

    document.getElementById("activityFilter")
      .addEventListener("change", renderPlayers);

    function getGamesClass(games) {
      if (games < 10) return "low";
      if (games < 20) return "medium";
      if (games < 40) return "high";
      return "very-high";
    }

    function renderPlayers() {
      const filter = document.getElementById("activityFilter").value;
      const tbody = document.querySelector("#leaderboard tbody");
      tbody.innerHTML = "";

      let filtered = allPlayers.filter(player => {
        const games = player.games || 0;

        if (filter === "active") return games > 20;
        if (filter === "semi") return games > 10;
        return games > 0;
      });

      // Sort by rating (highest first)
      filtered.sort((a, b) => b.rating - a.rating);

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4">No players match this filter</td></tr>`;
        return;
      }

      filtered.forEach((player, index) => {
        const games = player.games || 0;
        const gamesClass = getGamesClass(games);

        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${index + 1}</td>
          <td>${player.name}</td>
          <td>${player.rating}</td>
          <td class="${gamesClass}">${games}</td>
        `;

        tbody.appendChild(row);
      });
    }
  </script>

</body>
</html>
